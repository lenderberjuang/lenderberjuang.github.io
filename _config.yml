title: Lender Berjuang
description: >-
  Update perkembangan kasus, proses hukum, dan advokasi untuk komunitas lender
  yang terdampak. Ditulis untuk membantu sesama korban memahami langkah dan
  hak mereka.
theme: minima

# Menu navigasi di bagian atas web
header_pages:
  - about.md
  - proses-hukum.md

# Format tanggal untuk artikel
permalink: /:year/:month/:day/:title/

# Plugin bawaan GitHub Pages yang aman dipakai tanpa install tambahan
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Ganti sesuai username GitHub kamu setelah upload
# url: "https://USERNAME-KAMU.github.io"
